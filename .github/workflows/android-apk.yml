name: Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERSION_CODE: ${{ github.run_number }}
      VERSION_NAME: 1.2.${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: bash mobile/build.sh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: royal-match-poker-debug
          path: mobile/output/royal-match-poker-debug.apk
          if-no-files-found: error
          retention-days: 90

      - name: Job summary
        run: |
          {
            echo "### Android APK built"
            echo "- Version: \`${VERSION_NAME}\` (code ${VERSION_CODE})"
            echo "- Download **royal-match-poker-debug** from the Artifacts section of this run."
          } >> "$GITHUB_STEP_SUMMARY"
