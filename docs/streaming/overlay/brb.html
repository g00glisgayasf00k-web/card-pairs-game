<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Royal Poker Match — Be Right Back</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <div class="scene">
      <div class="scene__felt"></div>
      <div class="scene__corner scene__corner--tl"></div>
      <div class="scene__corner scene__corner--tr"></div>
      <div class="scene__corner scene__corner--bl"></div>
      <div class="scene__corner scene__corner--br"></div>

      <div class="scene__card">
        <img class="scene__logo" src="assets/logo-crown.png" alt="" style="height: 96px" />
        <p class="scene__eyebrow">Hold that thought</p>
        <h1 class="scene__title">Be right back</h1>
        <p class="scene__sub">
          Quick break — don’t fold yet. Chat stays open, stream returns in a minute.
        </p>
        <div class="scene__pips" aria-hidden="true">
          <span class="s">♠</span><span class="h">♥</span><span class="d">♦</span><span class="c">♣</span>
        </div>
      </div>
    </div>
  </body>
</html>
