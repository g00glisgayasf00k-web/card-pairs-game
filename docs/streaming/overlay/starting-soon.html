<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Royal Poker Match — Starting Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <div class="scene">
      <div class="scene__felt"></div>
      <div class="scene__corner scene__corner--tl"></div>
      <div class="scene__corner scene__corner--tr"></div>
      <div class="scene__corner scene__corner--bl"></div>
      <div class="scene__corner scene__corner--br"></div>

      <div class="scene__card">
        <img class="scene__logo" src="assets/logo-horizontal.png" alt="Royal Poker Match" />
        <div class="gold-line" style="margin: 0 auto 1.25rem; max-width: 18rem"></div>
        <p class="scene__eyebrow">Stream starting soon</p>
        <h1 class="scene__title">Shuffle up</h1>
        <p class="scene__sub">
          Pulling up Royal Poker Match — real poker hands, not candy crush.
          Stick around for Solo levels, Quick Play, and Cups.
        </p>
        <div class="scene__pips" aria-hidden="true">
          <span class="s">♠</span><span class="h">♥</span><span class="d">♦</span><span class="c">♣</span>
        </div>
        <p class="scene__countdown">Music up · Be right with you</p>
      </div>
    </div>
  </body>
</html>
