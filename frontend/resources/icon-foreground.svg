<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Royal Match Poker">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#f3ebdc"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <g transform="translate(512 520) rotate(-8)" filter="url(#shadow)">
    <rect x="-250" y="-340" width="500" height="680" rx="36" fill="url(#card)" stroke="#d8ccb8" stroke-width="10"/>
    <rect x="-228" y="-318" width="456" height="636" rx="28" fill="none" stroke="#ece3d4" stroke-width="4"/>

    <text x="-188" y="-248" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" fill="#1e293b">A</text>
    <text x="-188" y="-168" font-family="Segoe UI Symbol, Noto Sans Symbols2, sans-serif" font-size="72" fill="#1e293b">&#9824;</text>

    <text x="0" y="40" text-anchor="middle" font-family="Segoe UI Symbol, Noto Sans Symbols2, sans-serif" font-size="220" fill="#1e293b">&#9824;</text>

    <g transform="translate(188 318) rotate(180)">
      <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" fill="#1e293b">A</text>
      <text x="0" y="80" font-family="Segoe UI Symbol, Noto Sans Symbols2, sans-serif" font-size="72" fill="#1e293b">&#9824;</text>
    </g>
  </g>
</svg>
