# Render Blueprint — deploy from Dashboard: New > Blueprint
databases:
  - name: poker-pairs-db
    plan: free
    databaseName: poker_pairs
    user: poker_pairs

services:
  - type: web
    name: poker-pairs
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: poker-pairs-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: STATIC_FOLDER
        value: /app/static
      - key: PYTHON_VERSION
        value: "3.12.0"
